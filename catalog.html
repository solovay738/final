<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoDrive — Автосалон</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
<link rel="stylesheet" href="./style.css">
   
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark py-3">
    <div class="container">

      <a class="navbar-brand" href="#">
        AutoDrive
      </a>

      <!-- Burger -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Menu -->
      <div class="collapse navbar-collapse" id="navbarNav">

        <ul class="navbar-nav ms-auto align-items-lg-center">

          <li class="nav-item">
            <a class="nav-link active" href="/catalog.html">
              Головна
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="./catalog.html">
              Авто
            </a>
          </li>

          
          <li class="nav-item ms-lg-3">
            <a href="#contact" class="btn btn-danger px-4">
              Зв'язатися
            </a>
          </li>

        </ul>

      </div>
    </div>
  </nav>

  <!-- HERO -->
  
  <!-- FOOTER -->
  <footer id="contact">
    <!-- Bootstrap Icons -->
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
    .contact-card {
        background: #1a1a1a;
        color: #fff;
        border: 2px solid #ff6b00;
    }

    .contact-header {
        background: #ff6b00;
        color: #fff;
    }

    .form-control {
        background: #2a2a2a;
        color: #fff;
        border: 1px solid #444;
    }

    .form-control:focus {
        background: #2a2a2a;
        color: #fff;
        border-color: #ff6b00;
        box-shadow: 0 0 0 0.2rem rgba(255, 107, 0, 0.25);
    }

    .btn-orange {
        background: #ff6b00;
        border: none;
        color: #fff;
    }

    .btn-orange:hover {
        background: #e65f00;
        color: #fff;
    }

    .social-btn {
        border: 1px solid #ff6b00;
        color: #ff6b00;
        transition: .3s;
    }

    .social-btn:hover {
        background: #ff6b00;
        color: #fff;
    }

    hr {
        border-color: #444;
    }
</style>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card contact-card shadow-lg">

                <div class="card-header contact-header">
                    <h3 class="mb-0">
                        <i class="bi bi-car-front-fill"></i>
                        Зв'яжіться з нами
                    </h3>
                </div>

                <div class="card-body">

                    <form>
                        <div class="mb-3">
                            <label class="form-label">Ім'я</label>
                            <input type="text" class="form-control" placeholder="Ваше ім'я">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Телефон</label>
                            <input type="tel" class="form-control" placeholder="+380 XX XXX XX XX">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="example@email.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Повідомлення</label>
                            <textarea class="form-control" rows="4"
                                placeholder="Напишіть ваше повідомлення"></textarea>
                        </div>

                        <button type="submit" class="btn btn-orange">
                            <i class="bi bi-send-fill"></i>
                            Надіслати заявку
                        </button>
                    </form>

                    <hr class="my-4">

                    <h5 class="mb-3">
                        <i class="bi bi-share-fill"></i>
                        Наші соцмережі
                    </h5>

                    <div class="d-flex flex-wrap gap-2">
                        <a href="#" class="btn social-btn">
                            <i class="bi bi-facebook"></i> Facebook
                        </a>

                        <a href="#" class="btn social-btn">
                            <i class="bi bi-instagram"></i> Instagram
                        </a>

                        <a href="#" class="btn social-btn">
                            <i class="bi bi-telegram"></i> Telegram
                        </a>

                        <a href="#" class="btn social-btn">
                            <i class="bi bi-youtube"></i> YouTube
                        </a>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
    <p>© 2026 AutoDrive. Всі права захищені.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
